<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel WhatsApp</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a12;
    --surface: #120f1a;
    --surface2: #16121f;
    --border: #241d30;
    --green: #a855f7;
    --green-dim: rgba(168,85,247,0.12);
    --text: #f0e8ff;
    --muted: #6b5a80;
    --error: #f87171;
    --error-dim: rgba(248,113,113,0.1);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 32px 24px 48px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* ── Header ── */
  .page-header {
    max-width: 960px;
    margin: 0 auto 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .page-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .wa-icon {
    width: 36px; height: 36px;
    background: var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .wa-icon svg { width: 20px; height: 20px; fill: #000; }
  .page-title h1 {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--green);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .page-title p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .refresh-btn:hover { border-color: var(--green); color: var(--green); }
  .refresh-btn.spinning .icon { display: inline-block; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Grid ── */
  .grid {
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  /* ── Skeleton / loading state ── */
  .skeleton {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    height: 120px;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ── Instance card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #2a352a; }
  .card.connected { border-color: rgba(168,85,247,0.2); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .instance-info { flex: 1; min-width: 0; }
  .instance-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .instance-phone {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    font-family: var(--mono);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    border-radius: 999px;
    padding: 3px 9px;
    font-family: var(--mono);
    font-size: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .status-pill.ok {
    background: var(--green-dim);
    border: 1px solid rgba(168,85,247,0.2);
    color: var(--green);
  }
  .status-pill.off {
    background: var(--error-dim);
    border: 1px solid rgba(248,113,113,0.2);
    color: var(--error);
  }
  .status-pill.wait {
    background: rgba(250,204,21,0.1);
    border: 1px solid rgba(250,204,21,0.2);
    color: #facc15;
  }
  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }
  .status-pill.ok .status-dot { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .card-btn {
    width: 100%;
    padding: 9px;
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }
  .card-btn.primary { background: var(--green); color: #000; }
  .card-btn.primary:hover { filter: brightness(1.1); }
  .card-btn.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .card-btn.ghost:hover { border-color: var(--green); color: var(--green); }
  .card-btn:disabled { opacity: 0.4; cursor: default; filter: none; }

  /* ── Empty / error states ── */
  .page-message {
    max-width: 960px;
    margin: 60px auto;
    text-align: center;
  }
  .page-message .icon { font-size: 40px; margin-bottom: 16px; }
  .page-message h2 { font-family: var(--mono); font-size: 15px; color: var(--muted); margin-bottom: 8px; }
  .page-message p { font-size: 13px; color: var(--muted); }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 380px;
    overflow: hidden;
  }
  .modal-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--green);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 260px;
  }
  .close-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
    flex-shrink: 0;
  }
  .close-btn:hover { color: var(--text); }

  .modal-body {
    padding: 24px 20px;
    text-align: center;
  }

  .qr-container {
    position: relative;
    display: inline-block;
    padding: 14px;
    background: #fff;
    border-radius: 12px;
    margin-bottom: 16px;
  }
  .qr-container img { display: block; width: 210px; height: 210px; }
  .qr-overlay {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.92);
    border-radius: 12px;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: #1a1a1a;
    font-size: 13px;
    font-weight: 500;
  }
  .qr-overlay.show { display: flex; }

  .loader {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }

  .timer-bar {
    height: 3px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .timer-fill {
    height: 100%;
    background: var(--green);
    border-radius: 999px;
    transition: width 1s linear;
  }

  .instructions {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .instructions strong { color: var(--text); }

  .modal-btn-row { display: flex; gap: 8px; }
  .modal-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }
  .modal-btn.primary { background: var(--green); color: #000; }
  .modal-btn.primary:hover { filter: brightness(1.1); }
  .modal-btn.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .modal-btn.ghost:hover { border-color: var(--green); color: var(--green); }

  /* modal loading */
  .modal-loading {
    padding: 40px 0;
  }
  .modal-loading .loader { width: 36px; height: 36px; margin-bottom: 16px; }
  .modal-loading p { font-size: 13px; color: var(--muted); margin-top: 16px; }

  /* modal connected */
  .modal-connected { padding: 20px 0; }
  .check-circle {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--green-dim);
    border: 2px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    margin: 0 auto 16px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-connected h3 { font-family: var(--mono); font-size: 16px; color: var(--green); margin-bottom: 6px; }
  .modal-connected p { font-size: 13px; color: var(--muted); }
  .modal-connected .profile { font-family: var(--mono); font-size: 13px; color: var(--text); margin-top: 10px; }

  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">
    <div class="wa-icon">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 0C5.373 0 0 5.373 0 12c0 2.123.558 4.114 1.528 5.84L.057 23.514a.5.5 0 00.608.608l5.674-1.471A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.792 9.792 0 01-5.028-1.381l-.36-.214-3.732.978.995-3.63-.235-.374A9.793 9.793 0 012.182 12C2.182 6.573 6.573 2.182 12 2.182S21.818 6.573 21.818 12 17.427 21.818 12 21.818z"/></svg>
    </div>
    <div>
      <h1>Painel WhatsApp</h1>
      <p id="summaryText">Carregando instâncias...</p>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadAll()" id="refreshBtn">
    <span class="icon">↺</span> Atualizar
  </button>
</div>

<div id="mainContent"></div>

<!-- Modal QR -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Conectar</h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">POWERED BY GUSTAVO SUTIL</div>
  </div>
</div>

<script>
  // =====================================================
  // ⚙️  CONFIGURAÇÃO
  // =====================================================
  const N8N_STATUS  = 'https://auto.ppgeducacao.site/webhook/uazapi-status';
  const N8N_CONNECT = 'https://auto.ppgeducacao.site/webhook/uazapi-connect';
  const QR_TIMEOUT  = 60;
  const POLL_CARDS  = 8000;  // ms entre refresh dos cards

  const INSTANCES_CONFIG = [
    { token: 'd395a3a2-b737-429a-8551-bcff96d57ec2', name: 'Adones'           },
    { token: '230c5746-454a-49d4-b9b1-6eb953c706f6', name: 'Amanda'           },
    { token: '2cd3905e-4840-470a-928a-df73bbc06531', name: 'Debora'           },
    { token: 'f395c6e8-aa0b-4733-aa67-e57626d3ce34', name: 'Gustavo'          },
    { token: 'a15ca76f-2619-438a-87ba-b2a6e9922243', name: 'Leticia Tamara'   },
    { token: 'cb13876a-18e3-4eab-b8ab-32f9af89bda8', name: 'Leticia Carolina' },
    { token: 'b63981ed-63ba-4dc4-9861-a2265b605600', name: 'Suéli'            },
    { token: '5d0e6c31-8a4a-4369-ada6-bf50b27257c3', name: 'João Colombo'     },
  ];
  // =====================================================

  let instances      = [];
  let pollCardsTimer = null;
  let modalToken     = null;
  let modalTimer     = null;
  let modalPoll      = null;
  let modalTimerSec  = QR_TIMEOUT;
  let modalCurrentQR = null;

  // ── Carrega todas as instâncias ───────────────────────
  async function loadAll() {
    setRefreshing(true);
    // Renderiza skeletons imediatamente
    showSkeletons(INSTANCES_CONFIG.length);

    const results = await Promise.all(
      INSTANCES_CONFIG.map(async ({ token, name }) => {
        const data = await fetchStatus(token);
        if (data) {
          // Garante que o nome configurado prevalece
          if (data.instance) data.instance.name = data.instance.name || name;
          else data.instance = { name, token };
          return data;
        }
        // Fallback offline
        return { instance: { name, token }, status: { connected: false, loggedIn: false } };
      })
    );

    instances = results;
    renderGrid();
    setRefreshing(false);
  }

  // ── Renderiza grid de cards ───────────────────────────
  function renderGrid() {
    const el = document.getElementById('mainContent');
    if (!instances.length) {
      el.innerHTML = `<div class="page-message"><div class="icon">📭</div><h2>Nenhuma instância encontrada</h2><p>Verifique a configuração no n8n.</p></div>`;
      updateSummary();
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'grid';

    instances.forEach(data => {
      const inst   = data.instance || {};
      const status = data.status   || {};
      grid.appendChild(buildCard(inst, status));
    });

    el.innerHTML = '';
    el.appendChild(grid);
    updateSummary();
    schedulePoll();
  }

  function buildCard(inst, status) {
    const connected = status.connected && status.loggedIn;
    const waiting   = inst.qrcode && !connected;

    const card = document.createElement('div');
    card.className = 'card' + (connected ? ' connected' : '');
    card.id = 'card-' + inst.token;

    let pillClass = connected ? 'ok' : (waiting ? 'wait' : 'off');
    let pillText  = connected ? 'Conectado' : (waiting ? 'Aguardando scan' : 'Desconectado');

    const name  = inst.name || inst.token || '—';
    const phone = inst.profileName ? `+${inst.profileName}` : (connected ? 'Conectado' : '');

    const btnLabel = connected ? 'Reconectar' : '⊕ Conectar';
    const btnClass = connected ? 'ghost' : 'primary';

    card.innerHTML = `
      <div class="card-top">
        <div class="instance-info">
          <div class="instance-name" title="${name}">${name}</div>
          ${phone ? `<div class="instance-phone">${phone}</div>` : ''}
        </div>
        <div class="status-pill ${pillClass}">
          <div class="status-dot"></div>
          ${pillText}
        </div>
      </div>
      <button class="card-btn ${btnClass}" onclick="openModal('${inst.token}', '${name}')">${btnLabel}</button>
    `;
    return card;
  }

  function updateSummary() {
    const total = instances.length;
    const ok    = instances.filter(d => d.status?.connected && d.status?.loggedIn).length;
    document.getElementById('summaryText').textContent =
      total ? `${ok} de ${total} instância${total !== 1 ? 's' : ''} conectada${ok !== 1 ? 's' : ''}` : '';
  }

  // ── Poll silencioso dos cards ─────────────────────────
  function schedulePoll() {
    clearTimeout(pollCardsTimer);
    pollCardsTimer = setTimeout(async () => {
      await silentRefresh();
      schedulePoll();
    }, POLL_CARDS);
  }

  function showSkeletons(n) {
    const el = document.getElementById('mainContent');
    const grid = document.createElement('div');
    grid.className = 'grid';
    for (let i = 0; i < n; i++) {
      const sk = document.createElement('div');
      sk.className = 'skeleton';
      grid.appendChild(sk);
    }
    el.innerHTML = '';
    el.appendChild(grid);
  }

  async function silentRefresh() {
    try {
      const results = await Promise.all(
        INSTANCES_CONFIG.map(async ({ token, name }) => {
          const data = await fetchStatus(token);
          if (data) {
            if (data.instance) data.instance.name = data.instance.name || name;
            else data.instance = { name, token };
            return data;
          }
          return { instance: { name, token }, status: { connected: false, loggedIn: false } };
        })
      );
      instances = results;
      renderGrid();
    } catch (_) {}
  }

  // ── Modal ─────────────────────────────────────────────
  async function openModal(token, name) {
    modalToken = token;
    document.getElementById('modalTitle').textContent = name;
    document.getElementById('modalOverlay').classList.add('open');
    showModalLoading();
    stopModalTimers();

    const data = await fetchStatus(token);
    if (!data) { showModalQRError(); return; }

    const inst   = data.instance || {};
    const status = data.status   || {};

    if (status.connected && status.loggedIn) {
      showModalConnected(inst.profileName);
      return;
    }

    if (inst.qrcode) {
      showModalQR(inst.qrcode);
      startModalPoll();
    } else {
      await connectInstance(token);
    }
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    stopModalTimers();
    modalToken = null;
    modalCurrentQR = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  // ── Modal: estados ────────────────────────────────────
  function showModalLoading() {
    document.getElementById('modalBody').innerHTML = `
      <div class="modal-loading">
        <div class="loader"></div>
        <p>Verificando instância...</p>
      </div>`;
  }

  function showModalQR(qrBase64) {
    modalCurrentQR = qrBase64;
    document.getElementById('modalBody').innerHTML = `
      <div class="qr-container">
        <img id="modalQrImg" src="${qrBase64}" alt="QR Code">
        <div class="qr-overlay" id="modalQrOverlay">
          <div class="loader"></div>
          <span style="font-size:12px;margin-top:8px">Atualizando...</span>
        </div>
      </div>
      <div class="timer-bar"><div class="timer-fill" id="modalTimerFill"></div></div>
      <div class="instructions">
        Abra o <strong>WhatsApp</strong> → toque nos três pontinhos<br>
        → <strong>Dispositivos Conectados</strong> → <strong>Conectar dispositivo</strong>
      </div>
      <div class="modal-btn-row">
        <button class="modal-btn primary" onclick="refreshModalQR()">↺ Novo QR</button>
        <button class="modal-btn ghost" onclick="checkModalStatus()">Verificar</button>
      </div>`;
    startModalTimer();
  }

  function showModalConnected(profileName) {
    stopModalTimers();
    document.getElementById('modalBody').innerHTML = `
      <div class="modal-connected">
        <div class="check-circle">✓</div>
        <h3>Conectado!</h3>
        <p>WhatsApp vinculado com sucesso.</p>
        ${profileName ? `<div class="profile">${profileName}</div>` : ''}
      </div>`;
    silentRefresh();
  }

  function showModalQRError() {
    document.getElementById('modalBody').innerHTML = `
      <div class="modal-loading">
        <div style="font-size:36px;margin-bottom:12px">⚠️</div>
        <p>Não foi possível gerar o QR code.</p>
        <div style="margin-top:16px">
          <button class="modal-btn primary" onclick="openModal(modalToken, document.getElementById('modalTitle').textContent)" style="width:140px">Tentar novamente</button>
        </div>
      </div>`;
  }

  // ── Modal: connect ────────────────────────────────────
  async function connectInstance(token) {
    try {
      const res = await fetch(N8N_CONNECT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      if (!res.ok) throw new Error();
      const raw  = await res.json();
      const data = Array.isArray(raw) ? raw[0] : raw;
      const inst = data.instance || {};

      if (inst.qrcode) {
        showModalQR(inst.qrcode);
        startModalPoll();
      } else {
        setTimeout(async () => {
          const d = await fetchStatus(token);
          if (d) {
            const i = d.instance || {}, s = d.status || {};
            if (s.connected && s.loggedIn) showModalConnected(i.profileName);
            else if (i.qrcode) { showModalQR(i.qrcode); startModalPoll(); }
            else showModalQRError();
          }
        }, 2500);
      }
    } catch (_) { showModalQRError(); }
  }

  async function refreshModalQR() {
    const overlay = document.getElementById('modalQrOverlay');
    if (overlay) overlay.classList.add('show');
    stopModalTimers();
    await connectInstance(modalToken);
  }

  async function checkModalStatus() {
    const data = await fetchStatus(modalToken);
    if (!data) return;
    const inst = data.instance || {}, st = data.status || {};
    if (st.connected && st.loggedIn) showModalConnected(inst.profileName);
  }

  // ── Modal: poll ───────────────────────────────────────
  function startModalPoll() {
    clearInterval(modalPoll);
    modalPoll = setInterval(async () => {
      const data = await fetchStatus(modalToken);
      if (!data) return;
      const inst = data.instance || {}, st = data.status || {};
      if (st.connected && st.loggedIn) {
        showModalConnected(inst.profileName);
        return;
      }
      if (inst.qrcode && inst.qrcode !== modalCurrentQR) {
        modalCurrentQR = inst.qrcode;
        const img = document.getElementById('modalQrImg');
        if (img) { img.src = inst.qrcode; restartModalTimer(); }
      }
    }, 5000);
  }

  // ── Modal: timer ──────────────────────────────────────
  function startModalTimer() {
    clearInterval(modalTimer);
    modalTimerSec = QR_TIMEOUT;
    updateModalTimer();
    modalTimer = setInterval(() => {
      modalTimerSec--;
      updateModalTimer();
      if (modalTimerSec <= 0) { clearInterval(modalTimer); refreshModalQR(); }
    }, 1000);
  }

  function restartModalTimer() { startModalTimer(); }

  function updateModalTimer() {
    const el = document.getElementById('modalTimerFill');
    if (el) el.style.width = `${(modalTimerSec / QR_TIMEOUT) * 100}%`;
  }

  function stopModalTimers() {
    clearInterval(modalTimer);
    clearInterval(modalPoll);
    modalTimer = null;
    modalPoll  = null;
  }

  // ── HTTP ──────────────────────────────────────────────
  async function fetchStatus(token) {
    try {
      const res = await fetch(N8N_STATUS, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      if (!res.ok) throw new Error();
      const raw = await res.json();
      return Array.isArray(raw) ? raw[0] : raw;
    } catch (_) { return null; }
  }

  // ── UI helpers ────────────────────────────────────────
  function setRefreshing(on) {
    document.getElementById('refreshBtn').classList.toggle('spinning', on);
  }

  function showPageError(msg) {
    document.getElementById('mainContent').innerHTML = `
      <div class="page-message">
        <div class="icon">⚠️</div>
        <h2>Erro ao carregar</h2>
        <p>${msg}</p>
      </div>`;
    document.getElementById('summaryText').textContent = '';
  }

  // ── Start ─────────────────────────────────────────────
  loadAll();
</script>
</body>
</html>
